; PHP configuration for Render
session.save_path = /tmp
session.gc_maxlifetime = 86400

; Error logging
log_errors = On
error_log = php://stderr
display_errors = Off

; Memory and execution
memory_limit = 256M
max_execution_time = 60
upload_max_filesize = 10M

; Timezone
date.timezone = UTC

; File uploads
file_uploads = On
post_max_size = 10M

; Session
session.cookie_httponly = 1
session.use_strict_mode = 1

; PostgreSQL Extensions (add these lines)
extension=pdo_pgsql.so
extension=pgsql.so